spring.application.name=MediCore
spring.output.ansi.enabled=ALWAYS

#jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medicore_db}
#${DB_USER:root}
#${DB_PWD:Harsh@9595}

#spring.datasource.url=jdbc:mysql://localhost:3306/medicore_db
#spring.datasource.username=root
#spring.datasource.password=Harsh@9595
#spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fitness_db}


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernates.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug

server.port=8080
#server.servlet.context-path=/v1/api

# RabbitMQ custom configs
rabbitmq.email.queue.name=${RABBITMQ_EMAIL_QUEUE_NAME}
rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME}
rabbitmq.routing.key.pending=${RABBITMQ_ROUTING_KEY_PENDING}
rabbitmq.routing.key.confirmed=${RABBITMQ_ROUTING_KEY_CONFIRMED}
rabbitmq.routing.key.cancelled=${RABBITMQ_ROUTING_KEY_CANCELLED}

# SMTP
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}


