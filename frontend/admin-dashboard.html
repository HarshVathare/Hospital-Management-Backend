<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
.card-box { text-align:center; padding:20px; }
</style>
</head>

<body class="bg-light">

<div class="container py-4">

<h2 class="mb-4">Admin Dashboard</h2>

<!-- DASHBOARD STATS -->
<div class="row mb-4">
  <div class="col-md-3"><div class="card card-box"><h5>Total Patients</h5><h3 id="patients">0</h3></div></div>
  <div class="col-md-3"><div class="card card-box"><h5>Total Doctors</h5><h3 id="doctors">0</h3></div></div>
  <div class="col-md-3"><div class="card card-box"><h5>Total Appointments</h5><h3 id="appointments">0</h3></div></div>
  <div class="col-md-3"><div class="card card-box"><h5>Today Appointments</h5><h3 id="today">0</h3></div></div>
</div>

<!-- CREATE DOCTOR -->
<div class="card mb-4">
  <div class="card-header">Create Doctor</div>
  <div class="card-body">
    <input id="dname" class="form-control mb-2" placeholder="Name">
    <input id="demail" class="form-control mb-2" placeholder="Email">
    <input id="dspec" class="form-control mb-2" placeholder="Specialization">
    <input id="dexp" class="form-control mb-2" placeholder="Experience">
    <button class="btn btn-success" onclick="createDoctor()">Create</button>
  </div>
</div>

<!-- DOCTORS LIST -->
<div class="card mb-4">
  <div class="card-header">Docters</div>
  <div class="card-body" id="doctorList"></div>
</div>

<!-- USERS LIST -->
<div class="card">
  <div class="card-header">Users</div>
  <div class="card-body" id="userList"></div>
</div>

</div>

<script>
const API = "http://localhost:8080/api";

async function apiCall(url, options = {}) {
  const token = localStorage.getItem("accessToken");

  options.headers = {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
  };

  return fetch(url, options);
}

// ================= DASHBOARD =================
async function loadDashboard(){
  const res = await apiCall(API + "/admin/dashboard");
  const data = await res.json();

  document.getElementById("patients").innerText = data.totalPatients;
  document.getElementById("doctors").innerText = data.totalDocters;
  document.getElementById("appointments").innerText = data.totalAppointments;
  document.getElementById("today").innerText = data.todayAppointments;
}

// ================= CREATE DOCTOR =================
async function createDoctor(){
  const payload = {
    name: dname.value,
    email: demail.value,
    specialization: dspec.value,
    experienceInYears: dexp.value
  };

  const res = await apiCall(API + "/admin/docter", {
    method:"POST",
    body: JSON.stringify(payload)
  });

  if(res.ok){
    alert("Doctor Created");
    loadDoctors();
  } else {
    alert("Error creating doctor");
  }
}

// ================= GET DOCTORS =================
async function loadDoctors(){
  const res = await apiCall(API + "/admin/docters");
  const data = await res.json();

  const html = data.map(d => `
    <div class="border p-2 mb-2">
      <b>${d.name}</b> (${d.specialization})
      <button class="btn btn-danger btn-sm float-end"
        onclick="deleteDoctor(${d.id})">Delete</button>
    </div>
  `).join("");

  document.getElementById("doctorList").innerHTML = html;
}

// ================= DELETE DOCTOR =================
async function deleteDoctor(id){
  await apiCall(API + "/admin/docters/" + id, { method:"DELETE" });
  loadDoctors();
}

// ================= USERS =================
async function loadUsers(){
  const res = await apiCall(API + "/admin/users");
  const data = await res.json();

  const html = data.map(u => `
    <div class="border p-2 mb-2">
      <b>${u.name}</b> (${u.email})
      <button class="btn btn-danger btn-sm float-end"
        onclick="deleteUser(${u.id})">Delete</button>
    </div>
  `).join("");

  document.getElementById("userList").innerHTML = html;
}

// ================= DELETE USER =================
async function deleteUser(id){
  await apiCall(API + "/admin/user/" + id, { method:"DELETE" });
  loadUsers();
}

// INIT
window.onload = () => {
  loadDashboard();
  loadDoctors();
  loadUsers();
};
</script>

</body>
</html>
