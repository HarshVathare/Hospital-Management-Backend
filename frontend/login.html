<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <img src="assets/icons/Medicore.png" alt="MediCore Logo" class="mb-3" style="width: 180px;">
                            <!-- <i class="fas fa-hospital fa-3x text-primary mb-3"></i> -->
                            <h2>Login</h2>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="loginEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </form>
                        
                        
                        <div class="text-center mt-3">
                            
                            <p>New user? <a href="register.html">Register here</a></p>
                            <a href="forgot-password.html" class="d-block mt-2 text-primary">
                                Forgot Password?
                            </a>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8080/api';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // ✅ Save tokens to localStorage
                    localStorage.setItem('accessToken', result.accessToken);
                    localStorage.setItem('refreshToken', result.refreshToken);
                    localStorage.setItem('userId', result.user_Id);
                    localStorage.setItem('email', result.email);
                    localStorage.setItem('role',result.role);
                    
                   if (result.role === 'PATIENT') {
                        window.location.href = 'dashboard.html';
                    } 
                   else if (result.role === 'DOCTOR') {
                        window.location.href = 'docter-dashboard.html';
                    } 
                   else if (result.role === 'ADMIN') {
                        window.location.href = 'admin-dashboard.html';
                    } 
                   else {
                        alert("Unknown role");
                    }
                } else {
                    alert('Login failed: ' + (result.message || 'Please Verify your Email ..!'));
                }
            } catch (error) {
                alert('Login failed. Check connection.');
            }
        });
    </script>
</body>
</html>
