    <div class="container-fluid">

        <!-- MAIN -->

          <!-- PROFILE -->
          <div id="profileTab" class="dashboard-tab active">
            <div class="card">
              <div class="card-header">Doctor Profile</div>
              <div class="card-body">
                <form id="profileForm">

               <div class="card-header">Medical Records</div>
               <div class="card-body">
           
                 <!-- GET RECORDS -->
                 <input id="patientId" class="form-control mb-2" placeholder="Enter Patient ID" />
           
                 <button class="btn btn-info mb-3" onclick="getRecords()">
                   Get Records

                 <hr />
           
                 <!-- ADD RECORD -->
                 <h6>Add Medical Record</h6>

                   Add Record
                 </button>
           
               </div>
             </div>
           </div>



      </div>
    </div>

    <script>
      const API = "http://localhost:8080/api";

      async function apiCall(url, options = {}) {
        let accessToken = localStorage.getItem("accessToken");

        // Default headers
        options.headers = {
          ...options.headers,
          "Content-Type": "application/json",
          Authorization: "Bearer " + accessToken,
        };

        try {
          let response = await fetch(url, options);

          // 🔁 Handle token expiry
          if (response.status === 401) {
            const refreshToken = localStorage.getItem("refreshToken");

            const refreshRes = await fetch(API + "/auth/refresh-token", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ refreshToken }),
            });

            const refreshData = await refreshRes.json();

            if (refreshRes.ok) {
              // Save new token
              localStorage.setItem("accessToken", refreshData.accessToken);

              // Retry original request
              options.headers["Authorization"] =
                "Bearer " + refreshData.accessToken;
              return fetch(url, options);
            } else {
              alert("Session expired. Please login again.");
              localStorage.clear();
              window.location.href = "login.html";
              return;
            }
          }

          return response;
        } catch (error) {
          console.error("API Error:", error);
          throw error;
        }
      }

      // TAB SWITCH
      function showTab(tab) {
        document
          .querySelectorAll(".dashboard-tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(tab + "Tab").classList.add("active");
      }

      // UPDATE DOCTOR PROFILE
      document
        .getElementById("profileForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const data = {
            // docterId: document.getElementById("id").value,
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            specialization: document.getElementById("specialization").value,
            experienceInYears: document.getElementById("experianceInYears").value,
          };

          try {
            const response = await apiCall(
              API + "/docters/profile",
              "PUT",
              data,
            );

            if (response.ok) {
              alert("✅ Profile Updated");

              // optional UI update
              document.getElementById("doctorName").innerText = data.name;
              document.getElementById("sideName").innerText = data.name;
              document.getElementById("sideSpec").innerText =
                data.specialization;
              document.getElementById("email").value = data.email;
              document.getElementById("experianceInYears").value =
                data.experienceInYears;
            } else {
              const err = await response.json();
              alert("❌ Update failed: " + (err.message || "Error"));
            }
          } catch (error) {
            console.error(error);
            alert("❌ Server error");
          }
        });


      // const API = "http://localhost:8080/api";

// ✅ Common API call helper
async function apiCall(url, method = "GET", data = null) {
    return fetch(url, {
        method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("accessToken")
        },
        body: data ? JSON.stringify(data) : null
    });
}


//       // ================= LOAD PROFILE =================
async function loadProfile() {
    try {
        const res = await apiCall(API + "/docters/profile");
        const data = await res.json();

 document.getElementById("doctorName").innerText = data.name;
        document.getElementById("sideName").innerText = data.name;
        document.getElementById("sideSpec").innerText = data.role;

        console.log("PROFILE DATA:", data);

        // Fill UI
        document.getElementById("id").value = data.docter_id || data.id || "";
        document.getElementById("name").value = data.name || "";
        document.getElementById("email").value = data.email || "";
        document.getElementById("specialization").value = data.specialization || "";

        // ✅ Fix spelling issue (handles both cases)
        document.getElementById("experianceInYears").value =
            data.experienceInYears || data.experianceInYears || "";

    } catch (error) {
        console.error(error);
        alert("❌ Failed to load profile");
    }
}

// ================= UPDATE PROFILE =================
document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        specialization: document.getElementById("specialization").value,

        // ✅ send correct key (backend should use this)
        experienceInYears: document.getElementById("experianceInYears").value
    };

    try {
        const res = await apiCall(API + "/docters/profile", "PUT", data);

        if (res.ok) {
            alert("✅ Profile Updated");

            // Reload updated data
            loadProfile();

        } else {
            const err = await res.json();
            alert("❌ Update failed: " + (err.message || "Error"));
        }

    } catch (error) {
        console.error(error);
        alert("❌ Server error");
    }
});

 

      // ================= APPOINTMENTS =================
      async function loadAppointments() {
        try {
          const res = await apiCall(API + "/docters/appointments");
          const data = await res.json();

          const html = data
            .map(
              (a) => `
            <div class="card mb-2">
                <div class="card-body">
                    <h6>Appointment ID: ${a.appointment_Id}</h6>
                    <h6>Patient ID: ${a.patient_Id}</h6>
                    <h6>Patient Name: ${a.name}</h6>
                    <h6>Email: ${a.email_Id}</h6>

                    <h6>Appointment Time: 
                        ${new Date(a.appointment_Time).toLocaleString()}
                    </h6>

                    <h6>Medical History: ${a.medical_History}</h6>

                    <!-- CURRENT STATUS -->
                    <span class="badge bg-${
                      a.status === "CONFIRMED"
                        ? "success"
                        : a.status === "COMPLETED"
                          ? "primary"
                          : a.status === "CANCELLED"
                            ? "danger"
                            : "warning"
                    }">
                        ${a.status}
                    </span>

                    <br><br>

                    <!-- STATUS SELECT -->
                    <select id="status-${a.appointment_Id}" class="form-select form-select-sm w-50">
                        <option value="CONFIRMED" ${a.status === "CONFIRMED" ? "selected" : ""}>CONFIRMED</option>
                        <option value="COMPLETED" ${a.status === "COMPLETED" ? "selected" : ""}>COMPLETED</option>
                        <option value="CANCELLED" ${a.status === "CANCELLED" ? "selected" : ""}>CANCELLED</option>
                    </select>

                    <br>

                    <!-- UPDATE BUTTON -->
                    <button class="btn btn-primary btn-sm mt-2"
                        onclick="updateStatusFromSelect(${a.appointment_Id})">
                        Update Status
                    </button>
                </div>
            </div>
        `,
            )
            .join("");

          document.getElementById("appointmentsList").innerHTML = html;
        } catch (error) {
          console.error("Load Error:", error);
          alert("❌ Failed to load appointments");
        }
      }

      async function updateStatusFromSelect(appointment_Id) {
        const status = document.getElementById(
          `status-${appointment_Id}`,
        ).value;
        updateStatus(appointment_Id, status);
      }

      async function updateStatus(appointment_Id, status) {
        try {
          // ✅ Validate inputs
          if (!appointment_Id || !status) {
            alert("❌ Invalid appointment ID or status");
            return;
          }

          const url = API + `/docters/appointments/${appointment_Id}/status`;

          const payload = {
            appointment_status: status,
            availability: true,
          };

          console.log("👉 URL:", url);
          console.log("👉 Payload:", payload);

          const res = await apiCall(url, {
            method: "PUT",
            body: JSON.stringify(payload),
          });

          // ✅ Handle empty response safely
          let data = null;
          try {
            data = await res.json();
          } catch {
            console.warn("No JSON response");
          }

          console.log("👉 Status Code:", res.status);
          console.log("👉 Response Data:", data);

          if (res.ok) {
            // 🔥 Extra verification (important)
            if (data && data.status && data.status !== status) {
              alert("⚠️ Status not updated correctly in backend!");
              return;
            }

            alert("✅ Appointment status updated successfully!");
            loadAppointments();
          } else {
            alert("❌ Failed: " + (data?.message || `HTTP ${res.status}`));
          }
        } catch (error) {
          console.error("❌ Update Error:", error);
          alert("❌ Error updating appointment: " + error.message);
        }
      }

 
      // ================= MEDICAL RECORD =================
    async function getRecords() {
    try {
        const patientId = document.getElementById("patientId").value;

        const res = await apiCall(
            API + `/docters/medical-record/${patientId}`
        );

        const data = await res.json();

        if (!data || data.length === 0) {
            document.getElementById("recordsList").innerHTML =
                "<p>No records found</p>";
            return;
        }

        const html = data.map(r => `
            <div class="card mb-2">
                <div class="card-body">
                    <h6>Patient ID: ${r.patient_Id}</h6>
                    <h6>Patient Name: ${r.patient_Name}</h6>

                    <h6>Diagnosis: ${r.diagnosis}</h6>
                    <h6>Medicine: ${r.medicine}</h6>
 
                    <h6>Notes: ${r.notes}</h6>

                    <h6>Doctor: ${r.docter_Name}</h6>

                    <h6>Date: 
                        ${new Date(r.createdAt).toLocaleString()}
                    </h6>
                </div>
            </div>
        `).join("");

        document.getElementById("recordsList").innerHTML = html;

    } catch (error) {
        console.error(error);
        alert("❌ Error fetching records");
    }
}

async function addRecord() {
    try {
        const appointmentId = document.getElementById("appointmentId").value;

        // ✅ CORRECTED: Matches MedicalRecordRequestDTO structure
        const payload = {
            diagnosis: document.getElementById("diagnosis").value,
            prescription: document.getElementById("prescription").value, // Simple string
            notes: document.getElementById("notes").value
        };

        console.log("POST Payload:", payload);

        const res = await apiCall(
            API + `/docters/${appointmentId}/medical-record`,
            {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await res.json().catch(() => null);

        if (res.ok) {
            alert("✅ Medical record added successfully!");
            
            // Clear form fields
            document.getElementById("diagnosis").value = "";
            document.getElementById("prescription").value = "";
            document.getElementById("notes").value = "";
        } else {
            alert("❌ Failed: " + (data?.message || "Error adding record"));
        }

    } catch (error) {
        console.error(error);
        alert("❌ Error adding medical record");
    }
}
      // ================= LOGOUT =================

      async function logout() {
        if (!confirm("Are you sure you want to logout?")) return;

        const refreshToken = localStorage.getItem("refreshToken");

        try {
          await fetch("http://localhost:8080/api/auth/logout", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ refreshToken }),
          });
        } catch (e) {
          console.log("Logout API failed");
        }

        localStorage.clear();
        window.location.href = "login.html";
      }

      // INIT
      window.onload = () => {
        loadProfile();
        loadAppointments();
      };
    </script>
