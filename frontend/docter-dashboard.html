<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      .sidebar {
        background: #f8f9fa;
        height: 100vh;
        padding: 20px;
      }
      .nav-link.active {
        background: #007bff;
        color: white;
      }
      .dashboard-tab {
        display: none;
      }
      .dashboard-tab.active {
        display: block;
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand">Doctor Dashboard</span>
        <div>
          <span id="doctorName" class="text-white me-3"></span>
          <button class="btn btn-light btn-sm" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-3">
          <div class="sidebar">
            <h5 id="sideName">Loading...</h5>
            <p id="sideSpec"></p>

            <ul class="nav flex-column">
              <li>
                <a class="nav-link active" onclick="showTab('profile')"
                  >Profile</a
                >
              </li>
              <li>
                <a class="nav-link" onclick="showTab('appointments')"
                  >Appointments</a
                >
              </li>
              <li>
                <a class="nav-link" onclick="showTab('records')"
                  >Medical Records</a
                >
              </li>
            </ul>
          </div>
        </div>

        <!-- MAIN -->
        <div class="col-md-9 p-4">
          <!-- PROFILE -->
          <div id="profileTab" class="dashboard-tab active">
            <div class="card">
              <div class="card-header">Doctor Profile</div>
              <div class="card-body">
                <form id="profileForm">
                  <b> Docter Id : </b>
                  <input id="id" class="form-control mb-2" readonly />
                  <b> Name : </b>
                  <input
                    id="name"
                    class="form-control mb-2"
                    placeholder="Name"
                  />
                  <b> Email : </b
                  ><input
                    id="email"
                    class="form-control mb-2"
                    placeholder="Email"
                  />
                  <b> Specialization : </b
                  ><input
                    id="specialization"
                    class="form-control mb-2"
                    placeholder="Specialization"
                  />
                  <b> Experience : </b
                  ><input
                    id="experience"
                    class="form-control mb-2"
                    placeholder="Experience"
                  />

                  <button class="btn btn-primary">Update Profile</button>
                </form>
              </div>
            </div>
          </div>

          <!-- APPOINTMENTS -->
          <div id="appointmentsTab" class="dashboard-tab">
            <div class="card">
              <div class="card-header">Appointments</div>
              <div class="card-body" id="appointmentsList">Loading...</div>
            </div>
          </div>

          <!-- MEDICAL RECORDS -->
          <div id="recordsTab" class="dashboard-tab">
            <div class="card">
              <div class="card-header">Medical Records</div>
              <div class="card-body">
                <input
                  id="patientId"
                  class="form-control mb-2"
                  placeholder="Enter Patient ID"
                />

                <button class="btn btn-info mb-3" onclick="getRecords()">
                  Get Records
                </button>

                <div id="recordsList"></div>

                <hr />

                <h6>Add Record</h6>
                <textarea id="recordText" class="form-control mb-2"></textarea>

                <button class="btn btn-success" onclick="addRecord()">
                  Add Record
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8080/api";

      async function apiCall(url, options = {}) {
        let accessToken = localStorage.getItem("accessToken");

        // Default headers
        options.headers = {
          ...options.headers,
          "Content-Type": "application/json",
          Authorization: "Bearer " + accessToken,
        };

        try {
          let response = await fetch(url, options);

          // 🔁 Handle token expiry
          if (response.status === 401) {
            const refreshToken = localStorage.getItem("refreshToken");

            const refreshRes = await fetch(API + "/auth/refresh-token", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ refreshToken }),
            });

            const refreshData = await refreshRes.json();

            if (refreshRes.ok) {
              // Save new token
              localStorage.setItem("accessToken", refreshData.accessToken);

              // Retry original request
              options.headers["Authorization"] =
                "Bearer " + refreshData.accessToken;
              return fetch(url, options);
            } else {
              alert("Session expired. Please login again.");
              localStorage.clear();
              window.location.href = "login.html";
              return;
            }
          }

          return response;
        } catch (error) {
          console.error("API Error:", error);
          throw error;
        }
      }

      // TAB SWITCH
      function showTab(tab) {
        document
          .querySelectorAll(".dashboard-tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(tab + "Tab").classList.add("active");
      }

      // ================= PROFILE =================
      async function loadProfile() {
        const res = await apiCall(API + "/docters/profile");
        const data = await res.json();

        document.getElementById("doctorName").innerText = data.name;
        document.getElementById("sideName").innerText = data.name;
        document.getElementById("sideSpec").innerText = data.specialization;

        document.getElementById("id").value = data.docter_id; // readonly
        document.getElementById("name").value = data.name;
        document.getElementById("email").value = data.email;
        document.getElementById("specialization").value = data.specialization;
        document.getElementById("experience").value = data.experienceInYears;
      }

      // UPDATE DOCTOR PROFILE
      document
        .getElementById("profileForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const data = {
            // docterId: document.getElementById("id").value,
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            specialization: document.getElementById("specialization").value,
            experienceInYears: document.getElementById("experience").value,
          };

          try {
            const response = await apiCall(
              API + "/docters/profile",
              "PUT",
              data,
            );

            if (response.ok) {
              alert("✅ Profile Updated");

              // optional UI update
              document.getElementById("doctorName").innerText = data.name;
              document.getElementById("sideName").innerText = data.name;
              document.getElementById("sideSpec").innerText =
                data.specialization;
              document.getElementById("email").value = data.email;
              document.getElementById("experience").value =
                data.experienceInYears;
            } else {
              const err = await response.json();
              alert("❌ Update failed: " + (err.message || "Error"));
            }
          } catch (error) {
            console.error(error);
            alert("❌ Server error");
          }
        });

      // ================= APPOINTMENTS =================
      async function loadAppointments() {
        try {
          const res = await apiCall(API + "/docters/appointments");
          const data = await res.json();

          const html = data
            .map(
              (a) => `
            <div class="card mb-2">
                <div class="card-body">
                    <h6>Appointment ID: ${a.appointment_Id}</h6>
                    <h6>Patient ID: ${a.patient_Id}</h6>
                    <h6>Patient Name: ${a.name}</h6>
                    <h6>Email: ${a.email_Id}</h6>

                    <h6>Appointment Time: 
                        ${new Date(a.appointment_Time).toLocaleString()}
                    </h6>

                    <h6>Medical History: ${a.medical_History}</h6>

                    <!-- CURRENT STATUS -->
                    <span class="badge bg-${
                      a.status === "CONFIRMED"
                        ? "success"
                        : a.status === "COMPLETED"
                          ? "primary"
                          : a.status === "CANCELLED"
                            ? "danger"
                            : "warning"
                    }">
                        ${a.status}
                    </span>

                    <br><br>

                    <!-- STATUS SELECT -->
                    <select id="status-${a.appointment_Id}" class="form-select form-select-sm w-50">
                        <option value="CONFIRMED" ${a.status === "CONFIRMED" ? "selected" : ""}>CONFIRMED</option>
                        <option value="COMPLETED" ${a.status === "COMPLETED" ? "selected" : ""}>COMPLETED</option>
                        <option value="CANCELLED" ${a.status === "CANCELLED" ? "selected" : ""}>CANCELLED</option>
                    </select>

                    <br>

                    <!-- UPDATE BUTTON -->
                    <button class="btn btn-primary btn-sm mt-2"
                        onclick="updateStatusFromSelect(${a.appointment_Id})">
                        Update Status
                    </button>
                </div>
            </div>
        `,
            )
            .join("");

          document.getElementById("appointmentsList").innerHTML = html;
        } catch (error) {
          console.error("Load Error:", error);
          alert("❌ Failed to load appointments");
        }
      }

      async function updateStatusFromSelect(appointment_Id) {
        const status = document.getElementById(
          `status-${appointment_Id}`,
        ).value;
        updateStatus(appointment_Id, status);
      }

      async function updateStatus(appointment_Id, status) {
        try {
          // ✅ Validate inputs
          if (!appointment_Id || !status) {
            alert("❌ Invalid appointment ID or status");
            return;
          }

          const url = API + `/docters/appointments/${appointment_Id}/status`;

          const payload = {
            appointment_status: status,
            availability: true,
          };

          console.log("👉 URL:", url);
          console.log("👉 Payload:", payload);

          const res = await apiCall(url, {
            method: "PUT",
            body: JSON.stringify(payload),
          });

          // ✅ Handle empty response safely
          let data = null;
          try {
            data = await res.json();
          } catch {
            console.warn("No JSON response");
          }

          console.log("👉 Status Code:", res.status);
          console.log("👉 Response Data:", data);

          if (res.ok) {
            // 🔥 Extra verification (important)
            if (data && data.status && data.status !== status) {
              alert("⚠️ Status not updated correctly in backend!");
              return;
            }

            alert("✅ Appointment status updated successfully!");
            loadAppointments();
          } else {
            alert("❌ Failed: " + (data?.message || `HTTP ${res.status}`));
          }
        } catch (error) {
          console.error("❌ Update Error:", error);
          alert("❌ Error updating appointment: " + error.message);
        }
      }

 
      // ================= MEDICAL RECORD =================
      async function getRecords() {
        const patientId = document.getElementById("patientId").value;

        const res = await apiCall(
          API + `/docters/medical-records/${patientId}`,
        );
        const data = await res.json();

        const html = data
          .map(
            (r) => `
        <div class="card mb-2">
            <div class="card-body">${r.description}</div>
        </div>
    `,
          )
          .join("");

        document.getElementById("recordsList").innerHTML = html;
      }

      // ADD RECORD
      async function addRecord() {
        const patientId = document.getElementById("patientId").value;
        const text = document.getElementById("recordText").value;

        await apiCall(API + "/docters/medical-records", "POST", {
          patientId: patientId,
          description: text,
        });

        alert("Record Added");
        getRecords();
      }

      // ================= LOGOUT =================

      async function logout() {
        if (!confirm("Are you sure you want to logout?")) return;

        const refreshToken = localStorage.getItem("refreshToken");

        try {
          await fetch("http://localhost:8080/api/auth/logout", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ refreshToken }),
          });
        } catch (e) {
          console.log("Logout API failed");
        }

        localStorage.clear();
        window.location.href = "login.html";
      }

      // INIT
      window.onload = () => {
        loadProfile();
        loadAppointments();
      };
    </script>
  </body>
</html>
